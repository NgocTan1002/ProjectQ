{% extends "base.html" %}{% block title %}Product Analytics — Dashboard{% endblock %}
{% block content %}<div class="max-w-7xl mx-auto px-4 py-10"><h1 class="font-display text-3xl font-bold text-slate-900 mb-8">Product Analytics</h1>
<div class="bg-white rounded-2xl border border-slate-200 overflow-hidden"><div class="px-6 py-4 border-b border-slate-100"><h2 class="font-bold text-slate-900">Top Viewed Products</h2></div>
<table class="w-full text-sm"><thead><tr class="bg-slate-50"><th class="px-5 py-3 text-left font-semibold text-slate-600">Product</th><th class="px-5 py-3 text-left font-semibold text-slate-600">SKU</th><th class="px-5 py-3 text-right font-semibold text-slate-600">Views</th><th class="px-5 py-3 text-left font-semibold text-slate-600">Stock</th></tr></thead>
<tbody class="divide-y divide-slate-100">{% for p in top_viewed %}<tr><td class="px-5 py-3 font-medium text-slate-800">{{ p.name }}</td><td class="px-5 py-3 font-mono text-slate-500 text-xs">{{ p.sku }}</td><td class="px-5 py-3 text-right font-semibold text-brand-700">{{ p.view_count }}</td><td class="px-5 py-3"><span class="px-2 py-1 rounded-lg text-xs font-semibold {% if p.stock_status == 'in_stock' %}bg-green-100 text-green-700{% elif p.stock_status == 'low_stock' %}bg-yellow-100 text-yellow-700{% else %}bg-red-100 text-red-600{% endif %}">{{ p.get_stock_status_display }}</span></td></tr>{% endfor %}</tbody></table></div></div>{% endblock %}
